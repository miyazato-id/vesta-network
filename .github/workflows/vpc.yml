name: VPC CI/CD

on:
  push:
    branches:
      - main
  pull_request: {}

jobs:
  cfn-lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Install cfn-lint
        run: pip install cfn-lint

      - name: Run cfn-lint
        run: cfn-lint cfn/vpc.yml
